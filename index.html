<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>İhale &amp; Yarışma İlanları — Yaklaşık Maliyet Portalı</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="site-header">
    <div class="container header-inner">
      <a href="#" class="logo">
        <span class="logo-mark">YM</span>
        <span class="logo-text">Yaklaşık Maliyet <strong>Portalı</strong></span>
      </a>
      <nav class="main-nav">
        <a href="#" class="active">İlanlar</a>
        <a href="#">Sonuçlananlar</a>
        <a href="#">Kurumlar</a>
        <a href="#">Hakkında</a>
      </nav>
    </div>
  </header>

  <section class="toolbar">
    <div class="container toolbar-inner">
      <div class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="search" id="searchInput" placeholder="İlan adı, numarası veya kurum ara...">
      </div>
      <div class="filters" id="filters">
        <button class="chip active" data-filter="hepsi">Tümü</button>
        <button class="chip" data-filter="acik">Katılıma Açık</button>
        <button class="chip" data-filter="yapim">Yapım</button>
        <button class="chip" data-filter="hizmet">Hizmet</button>
        <button class="chip" data-filter="mal">Mal</button>
        <button class="chip" data-filter="danismanlik">Danışmanlık</button>
      </div>
    </div>
  </section>

  <main class="container">
    <div class="list-meta">
      <span id="resultCount"></span>
      <span class="sort">Sırala: <strong>Tarihe göre ↓</strong></span>
    </div>
    <div id="ilanList" class="ilan-list"></div>
    <p id="emptyState" class="empty-state" hidden>Aramanızla eşleşen ilan bulunamadı.</p>
  </main>

  <!-- Tam ekran belge görüntüleyici -->
  <div class="viewer" id="viewer" hidden>
    <header class="viewer-bar">
      <button class="viewer-close" id="viewerClose" aria-label="Kapat">&larr;</button>
      <div class="viewer-title">
        <strong id="viewerIhaleNo"></strong>
        <span id="viewerFileName"></span>
      </div>
      <div class="viewer-actions">
        <button class="viewer-zoom" id="viewerZoomOut" aria-label="Uzaklaştır">&minus;</button>
        <button class="viewer-zoom" id="viewerZoomIn" aria-label="Yakınlaştır">+</button>
        <a class="viewer-dl" id="viewerDownload" download aria-label="İndir">İndir</a>
      </div>
    </header>
    <nav class="viewer-files" id="viewerFiles"></nav>
    <div class="viewer-stage" id="viewerStage"></div>
  </div>

  <!-- İhale Detayı Modal -->
  <div class="modal-overlay" id="detayModal" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="detayModalTitle">
      <div class="modal-header">
        <div>
          <h2 id="detayModalTitle">İhale Detayı</h2>
          <p id="detayModalSubtitle" class="modal-subtitle"></p>
        </div>
        <button class="modal-close" id="detayModalClose" aria-label="Kapat">&times;</button>
      </div>
      <div class="modal-body" id="detayBody"></div>
    </div>
  </div>

  <footer class="site-footer">
    <div class="container">
      <p>© 2026 Yaklaşık Maliyet Portalı — Tüm ilan bilgileri ilgili kurumların resmî duyurularından derlenmiştir.</p>
    </div>
  </footer>

  <script src="vendor/jszip.min.js"></script>
  <script src="vendor/xlsx.full.min.js"></script>
  <script src="vendor/docx-preview.min.js"></script>
  <script src="js/data.js"></script>
  <script type="module" src="js/viewer.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
